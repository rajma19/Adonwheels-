<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
</head>
<body>
    <h2>Live Bookings</h2>
    <table border="1">
        <thead>
            <tr>
                <th>Car Name</th>
                <th>User</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Status update karne ka function
        window.updateStatus = async (id, newStatus) => {
            try {
                const docRef = doc(db, "bookings", id);
                await updateDoc(docRef, { status: newStatus });
                alert("Status updated to " + newStatus);
                fetchBookings(); // Table refresh karne ke liye
            } catch (e) {
                alert("Error updating status: " + e.message);
            }
        };

        async function fetchBookings() {
            const querySnapshot = await getDocs(collection(db, "bookings"));
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = ""; 
            
            querySnapshot.forEach((docSnap) => {
                const b = docSnap.data();
                const id = docSnap.id;
                
                // Sirf wahi rows dikhayega jisme carName hai (undefined hata dega)
                if (b.carName) {
                    tbody.innerHTML += `<tr>
                        <td>${b.carName}</td>
                        <td>${b.userName}</td>
                        <td>${b.status}</td>
                        <td>
                            <button onclick="updateStatus('${id}', 'Approved')">Approve</button>
                            <button onclick="updateStatus('${id}', 'Rejected')">Reject</button>
                        </td>
                    </tr>`;
                }
            });
        }
        
        fetchBookings();
    </script>
</body>
</html>
