<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdOnWheels Fleet Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📊 AdOnWheels Fleet Analytics</h2>

<div style="padding:10px; background:#f4f4f4; border-bottom:1px solid #ddd; margin-bottom:20px;">
  <a href="marketplace.html" style="text-decoration:none; font-weight:bold; color:#333;">🏠 Marketplace</a> | 
  <a href="admin.html" style="text-decoration:none; font-weight:bold; color:#333;">🛠 Admin Panel</a>
</div>

<div id="stats">Loading fleet data...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBDk359LPnFT_Jh7i6LdL35rS5Gd7inuHc",
  authDomain: "adonwheels-be097.firebaseapp.com",
  projectId: "adonwheels-be097",
  storageBucket: "adonwheels-be097.appspot.com",
  messagingSenderId: "90516470834",
  appId: "1:90516470834:web:5f7b5d769605199bd4d02b" // Unified uniform App ID
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SECURITY ACCESS WALL */
const user = JSON.parse(localStorage.getItem("loggedInUser"));

if (!user) {
  alert("Access Denied. Please log in first.");
  window.location.href = "login.html";
}

async function loadStats() {
  const statsContainer = document.getElementById("stats");
  
  try {
    const snapshot = await getDocs(collection(db, "cars"));

    let total = 0;
    let verified = 0;
    let unverified = 0;

    snapshot.forEach((doc) => {
      total++;
      const car = doc.data();

      // SAFE TYPE CHECK: Handles cases where verified is true (boolean) OR "true" (string)
      if (car.verified === true || car.verified === "true") {
        verified++;
      } else {
        unverified++;
      }
    });

    // Render modern, distinct data rows
    statsContainer.innerHTML = `
      <div class="card" style="border:1px solid #ccc; padding:20px; border-radius:8px; max-width:400px; background:#fff;">
        <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px;">📈 Fleet Summary</h3>
        <p style="font-size:16px;">🚘 <strong>Total Registered Fleet:</strong> ${total}</p>
        <p style="font-size:16px; color: green;">✅ <strong>Verified Ads-Ready:</strong> ${verified}</p>
        <p style="font-size:16px; color: #cc0000;">⏳ <strong>Pending Background Review:</strong> ${unverified}</p>
      </div>
    `;
    
  } catch (error) {
    statsContainer.innerHTML = `<p style="color:red;">Error loading metrics: ${error.message}</p>`;
  }
}

loadStats();
</script>

</body>
</html>
