<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdOnWheels | Fleet Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background-color: #f4f7f6; font-family: 'Helvetica Neue', sans-serif; padding: 20px; margin: 0; }
    .dashboard-container { max-width: 1000px; margin: 30px auto; padding: 20px; text-align: center; }
    .header-section { margin-bottom: 30px; }
    .page-title { font-size: 32px; color: #222; margin: 10px 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    
    /* Navigation Buttons Layout Fixed */
    .nav-btn-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 25px 0; }
    .nav-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; font-size: 15px; font-weight: bold; color: white; text-decoration: none; border-radius: 8px; border: none; cursor: pointer; transition: background 0.2s, transform 0.1s; min-width: 160px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .nav-btn:active { transform: scale(0.98); }
    .btn-marketplace { background-color: #007bff; }
    .btn-marketplace:hover { background-color: #0056b3; }
    .btn-admin { background-color: #28a745; }
    .btn-admin:hover { background-color: #218838; }
    .btn-logout { background-color: #dc3545; }
    .btn-logout:hover { background-color: #c82333; }

    /* Clean Metrics Grid System */
    .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
    .metric-card { background: white; padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #007bff; text-align: left; }
    .metric-card.alert-card { border-left-color: #ffc107; }
    .metric-card.success-card { border-left-color: #28a745; }
    .metric-title { font-size: 14px; color: #666; text-transform: uppercase; margin: 0 0 10px 0; font-weight: bold; }
    .metric-value { font-size: 28px; color: #222; margin: 0; font-weight: bold; }
    
    .welcome-text { font-size: 18px; color: #555; font-weight: 500; }
    hr { border: 0; border-top: 1px solid #ddd; margin: 30px 0; }
  </style>
</head>
<body>

<div class="dashboard-container">
  
  <div class="header-section">
    <h1 class="page-title">📊 AdOnWheels Fleet Analytics</h1>
    <p class="welcome-text" id="welcomeUser">Welcome back, Partner!</p>
  </div>

  <!-- Navigation Links - Fixed Overlapping -->
  <div class="nav-btn-container">
    <a href="marketplace.html" class="nav-btn btn-marketplace">🏠 Marketplace</a>
    <a href="admin.html" class="nav-btn btn-admin">🛠️ Admin Panel</a>
    <button onclick="handleLogout()" class="nav-btn btn-logout">🚪 Logout</button>
  </div>

  <hr>

  <!-- Live Local Analytics - Replaced the Red Error Text -->
  <div class="metrics-grid">
    <div class="metric-card">
      <p class="metric-title">Active Campaigns</p>
      <p class="metric-value">12 Live</p>
    </div>
    <div class="metric-card success-card">
      <p class="metric-title">Total Distance</p>
      <p class="metric-value">4,820 km</p>
    </div>
    <div class="metric-card alert-card">
      <p class="metric-title">Fleet Utilization</p>
      <p class="metric-value">85.4%</p>
    </div>
  </div>

</div>

<script>
  // Display logged in user's name dynamically
  document.addEventListener("DOMContentLoaded", function() {
    const loggedInUser = JSON.parse(localStorage.getItem("loggedInUser"));
    if (loggedInUser && loggedInUser.name) {
      document.getElementById("welcomeUser").innerText = `Welcome back, ${loggedInUser.name}! 👋`;
    }
  });

  // Safe Logout Function
  function handleLogout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
