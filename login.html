<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f9f9f9;">

  <h2 style="text-align: center;">🔐 Login to Your Account</h2>

  <form id="loginForm" style="display: flex; flex-direction: column; gap: 12px;">
    <label>Mobile Number:
      <input type="tel" id="phone" required pattern="[0-9]{10}" maxlength="10">
    </label>

    <label>Password:
      <input type="password" id="password" required>
    </label>

    <button type="submit">Login</button>
  </form>

  <p id="status" style="color: red; text-align: center; margin-top: 10px;"></p>

  <div style="text-align: center; margin-top: 20px;">
    <a href="signup.html" style="display: inline-block; margin: 5px 0;">📝 Don’t have an account? Sign Up</a><br>
    <a href="index.html" style="display: inline-block; margin: 5px 0;">🔙 Back to Home</a>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      let users = JSON.parse(localStorage.getItem("users")) || [];

      const matchedUser = users.find(user => user.phone === phone && user.password === password);

      if (matchedUser) {
        localStorage.setItem("loggedInUser", JSON.stringify(matchedUser));
        document.getElementById("status").style.color = "green";
        document.getElementById("status").innerText = "✅ Login successful!";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1000);
      } else {
        document.getElementById("status").innerText = "❌ Invalid mobile number or password.";
      }
    });
  </script>
</body>
</html>
