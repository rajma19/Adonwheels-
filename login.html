<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdOnWheels | Login & Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="font-family: sans-serif; background: #f1f1f1; padding: 20px;">

<div class="card" style="max-width: 400px; margin: 40px auto; padding: 30px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
  
  <!-- LOGO -->
  <h2 style="font-size: 28px; margin-bottom: 20px;">🚗 AdOnWheels</h2>

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h3 style="margin-bottom: 15px; color: #333;">🔐 Login to Your Account</h3>
    <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
      <div>
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Mobile Number</label>
        <input type="tel" id="phone" required pattern="[0-9]{10}" maxlength="10" style="width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;">
      </div>

      <div>
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Password</label>
        <input type="password" id="password" required style="width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;">
      </div>

      <button type="submit" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Login</button>
    </form>
    
    <div style="margin-top: 25px; font-size: 15px; color: #333; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span>Don’t have an account?</span>
      <a href="#" onclick="toggleSections(false)" style="background-color: #007bff; color: white !important; padding: 6px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; display: inline-block;">Sign Up</a>
    </div>
  </div>

  <!-- SIGNUP SECTION -->
  <div id="signupSection" style="display: none;">
    <h3 style="margin-bottom: 15px; color: #333;">📝 Create New Account</h3>
    <form id="signupForm" style="display: flex; flex-direction: column; gap: 15px; text-align: left;">
      <div>
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Full Name</label>
        <input type="text" id="newName" required style="width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;">
      </div>

      <div>
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Mobile Number</label>
        <input type="tel" id="newPhone" required pattern="[0-9]{10}" maxlength="10" style="width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;">
      </div>

      <div>
        <label style="font-size: 14px; color: #555; display: block; margin-bottom: 5px;">Create Password</label>
        <input type="password" id="newPassword" required style="width: 100%; padding: 10px; box-sizing: border-box; font-size: 16px; border: 1px solid #ccc; border-radius: 6px;">
      </div>

      <button type="submit" style="width: 100%; padding: 12px; font-size: 16px; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">Register</button>
    </form>
    
    <div style="margin-top: 25px; font-size: 15px; color: #333; display: flex; align-items: center; justify-content: center; gap: 8px;">
      <span>Already have an account?</span>
      <a href="#" onclick="toggleSections(true)" style="background-color: #007bff; color: white !important; padding: 6px 14px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; display: inline-block;">Login</a>
    </div>
  </div>

  <p id="status" style="color: red; font-weight: bold; margin-top: 15px; min-height: 20px; font-size: 14px;"></p>

  <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">
  
  <a href="index.html" style="background-color: #6c757d; color: white !important; padding: 10px 20px; border-radius: 6px; text-decoration: none; font-size: 14px; display: inline-block; font-weight: bold; width: 80%;">🔙 Back to Home</a>
</div>

<script>
  function toggleSections(showLogin) {
    document.getElementById("status").innerText = "";
    if (showLogin) {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("signupSection").style.display = "none";
    } else {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("signupSection").style.display = "block";
    }
  }

  // LOGIN
  document.getElementById("loginForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value.trim();
    const status = document.getElementById("status");

    let users = JSON.parse(localStorage.getItem("users")) || [];
    const matchedUser = users.find(user => user.phone === phone && user.password === password);

    if (matchedUser) {
      localStorage.setItem("loggedInUser", JSON.stringify(matchedUser));
      status.style.color = "green";
      status.innerText = "✅ Login successful!";
      setTimeout(() => {
        window.location.href = "marketplace.html";
      }, 1000);
    } else {
      status.style.color = "red";
      status.innerText = "❌ Invalid mobile number or password.";
    }
  });

  // SIGNUP
  document.getElementById("signupForm").addEventListener("submit", function (e) {
    e.preventDefault();
    const name = document.getElementById("newName").value.trim();
    const phone = document.getElementById("newPhone").value.trim();
    const password = document.getElementById("newPassword").value.trim();
    const status = document.getElementById("status");

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if (users.some(user => user.phone === phone)) {
      status.style.color = "red";
      status.innerText = "❌ This mobile number is already registered.";
      return;
    }

    users.push({ name: name, phone: phone, password: password });
    localStorage.setItem("users", JSON.stringify(users));

    status.style.color = "green";
    status.innerText = "✅ Registration successful! Please Login.";
    
    document.getElementById("signupForm").reset();
    
    setTimeout(() => {
      toggleSections(true);
    }, 1500);
  });
</script>

</body>
          </html>
