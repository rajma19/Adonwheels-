<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AdOnWheels Marketplace</title>
  <script type="module">
    // Firebase connection
    import { db } from './firebase-config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // Ye function button click hote hi chalega
    window.bookCar = async function(carName) {
        alert("Booking request sent for: " + carName);
        try {
            await addDoc(collection(db, "bookings"), {
                carName: carName,
                userName: "User",
                status: "Pending",
                timestamp: new Date().toISOString()
            });
            alert("Booking Successful!");
        } catch (e) {
            console.error("Error: ", e);
            alert("Error: " + e.message);
        }
    }
  </script>
</head>
<body>
  <button class="action-button" onclick="bookCar('Hyundai Creta')">Request Booking</button>
</body>
</html>
