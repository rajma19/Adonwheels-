<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AdOnWheels Marketplace</title>
  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.bookCar = async function(carName) {
        try {
            await addDoc(collection(db, "bookings"), {
                carName: carName,
                userName: "Guest User",
                status: "Pending",
                timestamp: new Date().toISOString()
            });
            alert("🎉 Success! Booking saved to Database.");
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
  </script>
</head>
<body>
  <h1>Marketplace</h1>
  <!-- Tumhari cars ki list yahan hai -->
  <button class="action-button" onclick="bookCar('Hyundai Creta')">Request Booking</button>
</body>
</html>
