<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdOnWheels Marketplace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h2>🚘 AdOnWheels Marketplace</h2>
  <p>Browse cars for advertisement</p>

  <div id="carList">
    <p>Loading cars...</p>
  </div>

  <br>
  <a href="index.html">🔙 Back</a>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDk359LPnFT_Jh7i6LdL35rS5Gd7inuHc",
      authDomain: "adonwheels-be097.firebaseapp.com",
      projectId: "adonwheels-be097",
      storageBucket: "adonwheels-be097.appspot.com",
      messagingSenderId: "90516470834",
      appId: "1:90516470834:web:2e8171d4ad7db539d4d02b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadCars() {
      const snapshot = await getDocs(collection(db, "cars"));

      const carList = document.getElementById("carList");
      carList.innerHTML = "";

      snapshot.forEach((doc) => {
        const car = doc.data();

        const total = Number(car.kmPerDay) * Number(car.pricePerKm);

        const div = document.createElement("div");

        div.style.border = "1px solid #ccc";
        div.style.padding = "10px";
        div.style.margin = "10px 0";
        div.style.borderRadius = "10px";

        div.innerHTML = `
          <strong>Owner:</strong> ${car.owner} ${car.verified ? "✔ Verified" : ""}<br>
          <strong>Model:</strong> ${car.model}<br>
          <strong>City:</strong> ${car.city}<br>
          <strong>KM/Day:</strong> ${car.kmPerDay}<br>
          <strong>Price/KM:</strong> ₹${car.pricePerKm}<br>

          <h3>💰 Estimated: ₹${total}</h3>

          <img src="${car.image}" width="200"><br><br>

          <button onclick="book('${car.ownerPhone}')">
            💬 Book on WhatsApp
          </button>
        `;

        carList.appendChild(div);
      });
    }

    window.book = function(phone) {
      window.open(
        "https://wa.me/" + phone + "?text=Hi, I want to advertise on your car",
        "_blank"
      );
    }

    loadCars();
  </script>

</body>
</html>
