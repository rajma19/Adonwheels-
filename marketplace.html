<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Marketplace</title>
</head>
<body>
    <h1>Marketplace</h1>
    <div class="car-card">
        <h3>Hyundai Creta</h3>
        <button onclick="bookCar('Hyundai Creta')">Request Booking</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.bookCar = async function(carName) {
            await addDoc(collection(db, "bookings"), {
                carName: carName,
                userName: "Guest",
                status: "Pending"
            });
            alert("Booking Requested!");
        }
    </script>
</body>
</html>
