<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdOnWheels Fleet Marketplace</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Final Professional Marketplace Styles */
    body { background-color: #f4f7f6; font-family: 'Helvetica Neue', sans-serif; padding: 20px; }
    .marketplace-container { max-width: 1200px; margin: 40px auto; padding: 20px; text-align: center; }
    .page-header { margin-bottom: 50px; }
    .page-title { font-size: 36px; margin: 0 0 10px; color: #333; }
    .page-subtitle { color: #666; font-size: 18px; margin-top: 0; }
    
    #fleet-summary-card { padding: 20px; background-color: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 40px; display: inline-block; width: 100%; max-width: 800px; box-sizing: border-box; }
    #status-display { color: #28a745; font-weight: bold; font-size: 17px; margin: 0; }
    
    .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; text-align: left; }
    .car-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow: 0.2s; position: relative; }
    .car-card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
    .car-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid #eee; }
    .car-details { padding: 15px; }
    .car-details h4 { margin: 0 0 8px; font-size: 19px; color: #222; }
    .car-details p { color: #666; font-size: 15px; margin: 4px 0; }
    
    .status-badge { position: absolute; top: 10px; right: 10px; padding: 5px 10px; border-radius: 5px; color: white; font-size: 12px; font-weight: bold; }
    .status-Available { background-color: #28a745; }
    .status-Booked { background-color: #dc3545; }

    .action-button { background-color: #007bff; color: white; padding: 10px 15px; border-radius: 6px; text-decoration: none; display: inline-block; font-weight: bold; font-size: 14px; margin-top: 10px; width: 100%; text-align: center; border: none; cursor: pointer; }
    .action-button:hover { background-color: #0056b3; }
  </style>
</head>
<body>

<div class="marketplace-container">
  
  <div class="page-header">
    <h1 class="page-title">🚗 AdOnWheels Fleet</h1>
    <p class="page-subtitle">Browse and select your next mobile advertising platform.</p>
  </div>

  <div id="fleet-summary-card">
    <p id="status-display">Marketplace Initialization Complete.</p>
  </div>
  
  <div id="marketplace-grid" class="car-grid">
    </div>

  <div style="margin-top: 60px; text-align: center;">
    <a href="index.html" class="button button-grey" style="padding: 12px 25px; text-decoration: none; display: inline-block; font-weight: bold; color: #fff; background-color: #6c757d; border-radius: 6px;">🔙 Back to Portal</a>
  </div>

</div>

<script>
  // Final Hardcoded Fleet Data (Eliminating External Dependencies)
  const finalFleetData = [
    {
      "id": "ADW01",
      "name": "Tesla Model 3 - Black Edition",
      "driverName": "Amit R.",
      "location": "Mumbai CBD & Suburbs",
      "image": "https://images.unsplash.com/photo-1560958089-b8a1929cea89?q=80&w=300&auto=format&fit=crop",
      "status": "Available"
    },
    {
      "id": "ADW02",
      "name": "Toyota Camry Hybrid",
      "driverName": "Rahul S.",
      "location": "Delhi NCR / Central Delhi",
      "image": "https://images.unsplash.com/photo-1619767886558-efdc259cde7c?q=80&w=300&auto=format&fit=crop",
      "status": "Booked"
    },
    {
      "id": "ADW03",
      "name": "Hyundai Creta - Silver Tech",
      "driverName": "Vikram P.",
      "location": "Bangalore / Tech Parks",
      "image": "https://images.unsplash.com/photo-1620986701403-f4c08a9f6ef9?q=80&w=300&auto=format&fit=crop",
      "status": "Available"
    },
    {
      "id": "ADW04",
      "name": "Jeep Compass - Off-Road Fleet",
      "driverName": "Suresh K.",
      "location": "Pune / Expressway Zone",
      "image": "https://images.unsplash.com/photo-1601625907471-a0832049e7a8?q=80&w=300&auto=format&fit=crop",
      "status": "Available"
    }
  ];

  // Function to render cars from hardcoded data
  function renderHardcodedMarketplace() {
    const grid = document.getElementById("marketplace-grid");
    const statusDisplay = document.getElementById("status-display");

    try {
      // Step 1: Render the dynamic grid from data
      if (finalFleetData && finalFleetData.length > 0) {
        statusDisplay.innerText = `🟢 AdOnWheels Active Fleet: ${finalFleetData.length} cars configured. All systems operational.`;
        statusDisplay.style.color = "#28a745";
        
        grid.innerHTML = ""; // Clear dynamic container

        finalFleetData.forEach(car => {
          grid.innerHTML += `
            <div class="car-card">
              <span class="status-badge status-${car.status}">${car.status}</span>
              <img src="${car.image}" alt="${car.name}" class="car-img">
              <div class="car-details">
                <h4>${car.name}</h4>
                <p><strong>Fleet ID:</strong> ${car.id}</p>
                <p><strong>Driver:</strong> ${car.driverName}</p>
                <p><strong>Primary Region:</strong> ${car.location}</p>
                <button class="action-button">Request Booking</button>
              </div>
            </div>
          `;
        });
      } else {
        statusDisplay.innerText = "Fleet database is empty. Add cars to view marketplace.";
        statusDisplay.style.color = "#6c757d";
      }
    } catch (e) {
      console.error("Critical rendering error:", e);
      statusDisplay.innerText = `❌ Fatal rendering error. Please re-deploy.`;
      statusDisplay.style.color = "#dc3545";
    }
  }

  // Execute immediately on load
  renderHardcodedMarketplace();
</script>

</body>
</html>
