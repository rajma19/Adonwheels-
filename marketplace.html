<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AdOnWheels Marketplace</title>
</head>
<body>
  <h1>Marketplace</h1>
  <button onclick="bookCar('Hyundai Creta')">Request Booking</button>

  <script type="module">
    import { db } from './firebase-config.js';
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    window.bookCar = async function(carName) {
        try {
            await addDoc(collection(db, "bookings"), {
                carName: carName,
                userName: "Guest",
                status: "Pending",
                timestamp: new Date().toISOString()
            });
            alert("🎉 Success! Booking saved to Database.");
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
  </script>
</body>
</html>
