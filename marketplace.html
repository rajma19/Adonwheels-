<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marketplace</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        .car-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: inline-block; margin-top: 50px; }
        button { background: #007bff; color: white; border: none; padding: 20px 40px; border-radius: 10px; cursor: pointer; font-size: 20px; font-weight: bold; }
        button:hover { background: #0056b3; }
        h1 { color: #333; }
    </style>
</head>
<body>
    <h1>Marketplace</h1>
    <div class="car-card">
        <h3>Hyundai Creta</h3>
        <button onclick="bookCar('Hyundai Creta')">Request Booking</button>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.bookCar = async function(carName) {
            await addDoc(collection(db, "bookings"), {
                carName: carName,
                userName: "Guest",
                status: "Pending"
            });
            alert("Booking Requested!");
        }
    </script>
</body>
</html>
