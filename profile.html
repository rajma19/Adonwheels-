<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Account Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2> My Profile</h2>

<!-- NAVIGATION TRUNK MAP -->
<div style="padding:10px; background:#f4f4f4; border-bottom:1px solid #ddd; margin-bottom:20px;">
  <a href="marketplace.html" style="text-decoration:none; font-weight:bold; color:#333;"> Marketplace</a> | 
  <a href="notifications.html" style="text-decoration:none; font-weight:bold; color:#333;"> Notifications Inbox</a>
</div>

<div id="profileBox">Loading account configuration parameters...</div>

<br>
<button onclick="logoutSession()" style="padding: 10px 18px; background: #dc3545; color: white; border: 0; border-radius: 4px; font-weight: bold; cursor: pointer;">
   Secure Logout
</button>

<script>
// UNIFICATION FIX: Reading the centralized JSON session payload object
const rawSession = localStorage.getItem("loggedInUser");

if (!rawSession) {
  alert("No active session detected. Returning to terminal portal.");
  window.location.href = "login.html";
}

// Convert string back into a functional JavaScript data object
const userSession = JSON.parse(rawSession);

// Render account information card cleanly
document.getElementById("profileBox").innerHTML = `
  <div class="card" style="border:1px solid #ccc; padding:20px; border-radius:6px; max-width:400px; background:#fff;">
    <h3 style="margin-top:0; border-bottom:1px solid #eee; padding-bottom:10px; color:#333;"> Authenticated Session</h3>
    <p style="font-size:15px; margin: 8px 0;"> <strong>Email Address:</strong> ${userSession.email}</p>
    <p style="font-size:15px; margin: 8px 0;"> <strong>Registered Phone:</strong> ${userSession.phone || 'Not Linked'}</p>
    <p style="font-size:15px; margin: 8px 0;"> <strong>Access Privileges:</strong> <span style="background:#eef; padding:2px 6px; border-radius:3px; font-size:13px; font-weight:bold;">${userSession.role || 'User'}</span></p>
  </div>
`;

// GLOBAL REGISTRATION: SIGN-OUT LIFECYCLE
function logoutSession() {
  if (confirm("Are you sure you want to sign out of AdOnWheels?")) {
    // Completely clear out the session token markers to protect user data privacy
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
