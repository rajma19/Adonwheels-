<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; background: #f9f9f9;">

  <h2 style="text-align: center;">📝 Create Your Account</h2>

  <form id="signupForm" style="display: flex; flex-direction: column; gap: 12px;">
    <label>Full Name:
      <input type="text" id="name" required>
    </label>

    <label>Mobile Number:
      <input type="tel" id="phone" required pattern="[0-9]{10}" maxlength="10">
    </label>

    <label>Create Password:
      <input type="password" id="password" required>
    </label>

    <button type="submit">Sign Up</button>
  </form>

  <p id="status" style="color: green; text-align: center; margin-top: 10px;"></p>

  <div style="text-align: center; margin-top: 20px;">
    <a href="login.html" style="display: inline-block; margin: 5px 0;">🔐 Already have an account? Login</a><br>
    <a href="index.html" style="display: inline-block; margin: 5px 0;">🔙 Back to Home</a>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || phone.length !== 10 || !password) {
        alert("Please fill all fields correctly.");
        return;
      }

      let users = JSON.parse(localStorage.getItem("users")) || [];

      // Check if number already registered
      const exists = users.find(user => user.phone === phone);
      if (exists) {
        document.getElementById("status").innerText = "❌ This number is already registered.";
        document.getElementById("status").style.color = "red";
        return;
      }

      // Save user
      users.push({ name, phone, password });
      localStorage.setItem("users", JSON.stringify(users));

      document.getElementById("status").innerText = "✅ Account created successfully!";
      document.getElementById("status").style.color = "green";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    });
  </script>
</body>
</html>
